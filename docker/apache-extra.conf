# Compressao (gzip) para respostas de texto/JSON e assets
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
    AddOutputFilterByType DEFLATE application/json application/javascript application/x-javascript
    AddOutputFilterByType DEFLATE image/svg+xml
</IfModule>

# Cache no navegador para arquivos estaticos (imagens/css/js)
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpeg "access plus 30 days"
    ExpiresByType image/png "access plus 30 days"
    ExpiresByType image/gif "access plus 30 days"
    ExpiresByType image/webp "access plus 30 days"
    ExpiresByType image/svg+xml "access plus 30 days"
    ExpiresByType text/css "access plus 7 days"
    ExpiresByType application/javascript "access plus 7 days"
    ExpiresByType application/x-javascript "access plus 7 days"
</IfModule>

# URLs amigaveis em portugues (sem .php visivel).
#
# As regras ficam dentro de um bloco <Directory> apontando para a raiz do
# site. Esse e o contexto CANONICO e previsivel do mod_rewrite: o Apache
# remove a barra inicial do caminho, entao o padrao casa contra o caminho
# relativo (ex.: "filmes", sem a barra), e a substituicao tambem e relativa
# ("manage_movies.php"). Isso evita as armadilhas do contexto global de
# servidor, onde as regras nao rodavam de forma confiavel e retornavam 404.
#
# Como as rotas sao de um nivel so, todos os caminhos relativos existentes
# no HTML/JS (href="images/...", href="add_movie.php", AJAX para
# "processData.php") continuam funcionando sem qualquer alteracao.
<Directory /var/www/html>
    Options +FollowSymLinks -MultiViews
    AllowOverride All
    Require all granted

    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /

        # Se o alvo for um arquivo ou diretorio real, nao reescreve
        # (deixa passar imagens, css, js, os proprios .php acessados
        # diretamente, uploads, etc).
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        # Entrar / Sair
        RewriteRule ^entrar/?$ index.php [L,QSA]
        RewriteRule ^sair/?$ logout.php [L,QSA]

        # Painel
        RewriteRule ^painel/?$ home.php [L,QSA]

        # Filmes / Series / TV ao vivo (catalogo)
        RewriteRule ^filmes/?$ manage_movies.php [L,QSA]
        RewriteRule ^adicionar-filme/?$ add_movie.php [L,QSA]
        RewriteRule ^generos/?$ manage_genres.php [L,QSA]
        RewriteRule ^adicionar-genero/?$ add_genre.php [L,QSA]
        RewriteRule ^idiomas/?$ manage_language.php [L,QSA]
        RewriteRule ^adicionar-idioma/?$ add_language.php [L,QSA]

        RewriteRule ^series/?$ manage_series.php [L,QSA]
        RewriteRule ^adicionar-serie/?$ add_series.php [L,QSA]
        RewriteRule ^temporadas/?$ manage_season.php [L,QSA]
        RewriteRule ^adicionar-temporada/?$ add_season.php [L,QSA]
        RewriteRule ^editar-temporada/?$ edit_season.php [L,QSA]
        RewriteRule ^episodios/?$ manage_episode.php [L,QSA]
        RewriteRule ^adicionar-episodio/?$ add_episode.php [L,QSA]

        RewriteRule ^categorias/?$ manage_category.php [L,QSA]
        RewriteRule ^adicionar-categoria/?$ add_category.php [L,QSA]
        RewriteRule ^canais/?$ manage_channels.php [L,QSA]
        RewriteRule ^adicionar-canal/?$ add_channel.php [L,QSA]
        RewriteRule ^editar-canal/?$ edit_channel.php [L,QSA]
        RewriteRule ^avaliacoes-canal/?$ channel_ratings.php [L,QSA]
        RewriteRule ^editar-video/?$ edit_video.php [L,QSA]

        # Gestao
        RewriteRule ^usuarios/?$ manage_users.php [L,QSA]
        RewriteRule ^adicionar-usuario/?$ add_user.php [L,QSA]
        RewriteRule ^comentarios/?$ manage_comments.php [L,QSA]
        RewriteRule ^denuncias/?$ manage_reports.php [L,QSA]
        RewriteRule ^denuncias-serie/?$ view_series_reports.php [L,QSA]
        RewriteRule ^denuncias-filme/?$ view_movie_reports.php [L,QSA]
        RewriteRule ^denuncias-canal/?$ view_channel_reports.php [L,QSA]
        RewriteRule ^notificacoes/?$ send_notification.php [L,QSA]

        # Sistema
        RewriteRule ^smtp/?$ smtp_settings.php [L,QSA]
        RewriteRule ^configuracoes/?$ settings.php [L,QSA]
        RewriteRule ^identificacao/?$ verification.php [L,QSA]
        RewriteRule ^urls-api/?$ api_urls.php [L,QSA]
        RewriteRule ^perfil/?$ profile.php [L,QSA]
        RewriteRule ^privacidade/?$ privacy_policy.php [L,QSA]
    </IfModule>
</Directory>
