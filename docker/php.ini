display_errors=Off
log_errors=On
memory_limit=256M
upload_max_filesize=512M
post_max_size=512M
max_execution_time=300
max_input_time=300
date.timezone=America/Sao_Paulo


; OPcache: acelera o PHP mantendo o bytecode compilado em memoria
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=60

; Sessoes persistentes: gravadas no volume "runtime" (sobrevive a redeploys
; do Dokploy) para que o admin NAO precise logar de novo apos um restart.
; Validade de 30 dias tanto no servidor quanto no cookie do navegador.
session.save_path=/var/www/html/runtime/sessions
session.gc_maxlifetime=2592000
session.cookie_lifetime=2592000
session.gc_probability=1
session.gc_divisor=100
session.cookie_httponly=1
session.use_strict_mode=1
